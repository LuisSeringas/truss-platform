# Deployment is handled by Vercel's GitHub integration.
# Every push to main triggers an automatic production deploy.
# PRs get preview deployments automatically.
#
# To connect: go to vercel.com → New Project → import LuisSeringas/truss-platform
# Set env vars in Vercel project settings (see .env.example).
#
# This workflow runs a smoke check after each Vercel deployment.
name: Post-deploy smoke

on:
  deployment_status:

jobs:
  smoke:
    name: Smoke test
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    env:
      DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
    steps:
      - name: Check homepage responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL")
          echo "Response: $STATUS for $DEPLOY_URL"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ] && [ "$STATUS" != "302" ]; then
            echo "Unexpected status $STATUS — deploy may have succeeded but app is broken"
            exit 1
          fi
